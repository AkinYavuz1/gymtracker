<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 512px;
      height: 512px;
      overflow: hidden;
      background: #0E0F14;
    }
    .icon {
      width: 512px;
      height: 512px;
      background: linear-gradient(145deg, #1A1C24 0%, #0E0F14 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .glow {
      position: absolute;
      width: 360px;
      height: 360px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(167,139,250,0.25) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .ring {
      position: absolute;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      border: 1px solid rgba(167,139,250,0.15);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .ring2 {
      position: absolute;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      border: 1px solid rgba(167,139,250,0.07);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .emoji {
      font-size: 220px;
      line-height: 1;
      position: relative;
      z-index: 2;
      filter: drop-shadow(0 0 40px rgba(167,139,250,0.5));
    }
  </style>
</head>
<body>
  <div class="icon">
    <div class="glow"></div>
    <div class="ring2"></div>
    <div class="ring"></div>
    <div class="emoji">💪</div>
  </div>
</body>
</html>
