<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — gAIns</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0E0F14;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #1A1C24;
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 420px;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.08);
      text-align: center;
    }
    .logo { font-size: 32px; font-weight: 900; color: #A78BFA; margin-bottom: 4px; }
    .sub { font-size: 13px; color: rgba(255,255,255,0.35); margin-bottom: 32px; }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
    p { font-size: 14px; color: rgba(255,255,255,0.55); line-height: 1.7; margin-bottom: 28px; }
    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: none;
      background: #A78BFA;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      text-decoration: none;
      margin-bottom: 12px;
    }
    .btn:hover { opacity: 0.9; }
    .note { font-size: 12px; color: rgba(255,255,255,0.25); margin-top: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">gAIns</div>
    <div class="sub">AI-powered strength training</div>
    <div class="icon">🔐</div>
    <h1>Reset Your Password</h1>
    <p id="msg">Opening the gAIns app to reset your password...</p>
    <a id="openBtn" class="btn" href="#">Open gAIns App</a>
    <div class="note" id="note"></div>
  </div>

  <script>
    // Grab all params from the URL (Supabase appends them)
    const params = new URLSearchParams(window.location.search);
    const hash = new URLSearchParams(window.location.hash.slice(1));

    const tokenHash = params.get('token_hash') || hash.get('token_hash');
    const accessToken = hash.get('access_token') || params.get('access_token');
    const refreshToken = hash.get('refresh_token') || params.get('refresh_token');
    const type = params.get('type') || hash.get('type') || 'recovery';

    // Build the deep link
    let deepLink;
    if (accessToken && refreshToken) {
      deepLink = `app.gainsai://auth/callback#access_token=${accessToken}&refresh_token=${refreshToken}&type=${type}`;
    } else if (tokenHash) {
      deepLink = `app.gainsai://auth/callback?token_hash=${tokenHash}&type=${type}`;
    } else {
      document.getElementById('msg').textContent = 'Invalid or expired link. Please request a new password reset.';
      document.getElementById('openBtn').style.display = 'none';
    }

    if (deepLink) {
      document.getElementById('openBtn').href = deepLink;

      // Auto-attempt to open the app
      window.location.href = deepLink;

      // After 2 seconds, update the message in case app didn't open
      setTimeout(() => {
        document.getElementById('msg').textContent = 'If the app didn\'t open automatically, tap the button below.';
        document.getElementById('note').textContent = 'Make sure gAIns is installed on this device.';
      }, 2000);
    }
  </script>
</body>
</html>
