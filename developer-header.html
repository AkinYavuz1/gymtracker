<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 4096px;
      height: 2304px;
      overflow: hidden;
      background: #0E0F14;
    }
    .header {
      width: 4096px;
      height: 2304px;
      background: #0E0F14;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* Grid lines */
    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(167,139,250,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(167,139,250,0.04) 1px, transparent 1px);
      background-size: 120px 120px;
    }

    /* Glow blobs */
    .blob-center {
      position: absolute;
      width: 2400px;
      height: 2400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(167,139,250,0.12) 0%, transparent 65%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .blob-left {
      position: absolute;
      width: 1200px;
      height: 1200px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124,58,237,0.1) 0%, transparent 70%);
      top: -200px;
      left: -200px;
    }
    .blob-right {
      position: absolute;
      width: 1000px;
      height: 1000px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(167,139,250,0.08) 0%, transparent 70%);
      bottom: -100px;
      right: 400px;
    }

    /* Decorative rings */
    .ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(167,139,250,0.08);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    /* Center content */
    .content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .emoji {
      font-size: 320px;
      line-height: 1;
      margin-bottom: 60px;
      filter: drop-shadow(0 0 80px rgba(167,139,250,0.6));
    }

    .logo {
      font-size: 260px;
      font-weight: 900;
      color: #A78BFA;
      letter-spacing: -8px;
      line-height: 1;
      margin-bottom: 40px;
      text-shadow: 0 0 120px rgba(167,139,250,0.4);
    }

    .tagline {
      font-size: 80px;
      font-weight: 600;
      color: rgba(255,255,255,0.85);
      letter-spacing: -1px;
      margin-bottom: 30px;
    }

    .sub {
      font-size: 52px;
      color: rgba(255,255,255,0.35);
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* Bottom pills row */
    .pills {
      position: absolute;
      bottom: 160px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 40px;
      z-index: 10;
      white-space: nowrap;
    }
    .pill {
      display: flex;
      align-items: center;
      gap: 20px;
      background: rgba(167,139,250,0.1);
      border: 2px solid rgba(167,139,250,0.2);
      border-radius: 100px;
      padding: 24px 56px;
    }
    .pill-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #A78BFA;
      flex-shrink: 0;
    }
    .pill span {
      font-size: 38px;
      color: rgba(255,255,255,0.7);
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="grid"></div>
    <div class="blob-center"></div>
    <div class="blob-left"></div>
    <div class="blob-right"></div>

    <!-- Decorative rings -->
    <div class="ring" style="width:1800px;height:1800px;"></div>
    <div class="ring" style="width:2600px;height:2600px;opacity:0.5;"></div>
    <div class="ring" style="width:3400px;height:3400px;opacity:0.3;"></div>

    <div class="content">
      <div class="emoji">💪</div>
      <div class="logo">gAIns</div>
      <div class="tagline">AI-Powered Strength Training</div>
      <div class="sub">Track · Analyse · Improve</div>
    </div>

    <div class="pills">
      <div class="pill"><div class="pill-dot"></div><span>AI Coaching</span></div>
      <div class="pill"><div class="pill-dot"></div><span>Personal Records</span></div>
      <div class="pill"><div class="pill-dot"></div><span>Workout Tracking</span></div>
      <div class="pill"><div class="pill-dot"></div><span>Offline Support</span></div>
    </div>
  </div>
</body>
</html>
